<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/stmarys.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FixMyCampus - Maintenance Portal</title>
    <style>
      :root {
        --brand-50: #2a0404;
        --brand-100: #3b0505;
        --brand-200: #5c0909;
        --brand-300: #7a0f0f;
        --brand-400: #9f1313;
        --brand-500: #b91e1e;
        --brand-600: #dc2626;
        --brand-700: #991b1b;
        --brand-800: #7f1d1d;
        --brand-900: #4c0f0f;

        --gray-50: #101010;
        --gray-100: #161616;
        --gray-200: #1f1f1f;
        --gray-300: #2b2b2b;
        --gray-400: #4d4d4d;
        --gray-500: #7a7a7a;
        --gray-600: #9a9a9a;
        --gray-700: #c0c0c0;
        --gray-800: #e6e6e6;
        --gray-900: #ffffff;

        --red-50: #2a0505;
        --red-100: #3f0c0c;
        --red-200: #641111;
        --red-300: #8a1818;
        --red-400: #b12727;
        --red-500: #dc2626;
        --red-600: #f43f3f;

        --surface: #080808;
        --surface-alt: #131313;
        --sidebar-bg: #050505;
        --sidebar-text: #c7c7c7;
        --sidebar-active: #180808;
        --sidebar-active-text: #ffffff;
        --sidebar-hover: #120505;

        --border: #2a2a2a;
        --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.35);
        --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.5), 0 2px 4px -2px rgba(0, 0, 0, 0.35);
        --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.55), 0 4px 6px -4px rgba(0, 0, 0, 0.4);
        --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.65), 0 8px 10px -6px rgba(0, 0, 0, 0.45);

        --font-display: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;

        --radius-sm: 4px;
        --radius-md: 6px;
        --radius-lg: 8px;
        --radius-xl: 12px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
        background-color: var(--surface);
        color: var(--gray-800);
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
